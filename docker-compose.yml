version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: markup-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/dist

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://markup.gaplytiq.com
    container_name: markup-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
